<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
</head>
<body>
    <div id="login-screen" class="login-screen active">
        <div class="login-container">
            <h1>AdminProp</h1>
            <p>Tu herramienta para administrar propiedades y alquileres, todo en un lugar.</p>
            <div class="buttons">
                <form id="login-form">
                    <label for="email-input">Email</label>
                    <input id="email-input" type="email" placeholder="Email">
                    <label for="password-input">Password</label>
                    <input id="password-input" type="password" placeholder="Password">
                    <button type="submit" class="btn-primary"><a href="dashboard.html">Registrarse</a></button>
                    <p class="message">¿Aún no tienes cuenta? <a href="register.html">Crea una</a></p>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
